name: Playwright Allure Report

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: allure-pages
  cancel-in-progress: false

jobs:
  tests:
    name: Run Tests and Publish Allure Report
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Download repository
        run: |
          curl -L "https://codeload.github.com/${GITHUB_REPOSITORY}/tar.gz/${GITHUB_SHA}" -o source.tar.gz
          tar -xzf source.tar.gz --strip-components=1
          node --version
          npm --version

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright Browsers
        run: npx playwright install --with-deps

      - name: Run Playwright Tests
        continue-on-error: true
        run: npx playwright test tests/authentication tests/product tests/cart tests/wishlist-compare

      - name: Verify Playwright Results
        run: |
          node - <<'NODE'
          const fs = require('fs');
          const path = require('path');
          const resultsDir = path.join(process.cwd(), 'allure-results');
          const resultFiles = fs.existsSync(resultsDir)
            ? fs.readdirSync(resultsDir).filter((file) => file.endsWith('-result.json'))
            : [];

          const results = resultFiles.map((file) => {
            const resultPath = path.join(resultsDir, file);
            return JSON.parse(fs.readFileSync(resultPath, 'utf8'));
          });

          const nonPassed = results.filter((result) => result.status !== 'passed');
          console.log(`Allure result files: ${results.length}`);
          console.log(`Passed: ${results.filter((result) => result.status === 'passed').length}`);
          console.log(`Non-passed: ${nonPassed.length}`);

          if (results.length !== 180 || nonPassed.length > 0) {
            console.error('Expected exactly 180 passed executions: 60 tests on Chromium, Firefox, and WebKit.');
            process.exit(1);
          }
          NODE

      - name: Install Allure Commandline
        if: always()
        run: npm install -g allure-commandline --save-dev

      - name: Generate Allure report
        if: always()
        run: allure generate allure-results --clean -o allure-report

      - name: Deploy Report to GitHub Pages
        if: success()
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          rm -rf gh-pages-publish
          mkdir gh-pages-publish
          cp -R allure-report/. gh-pages-publish/
          touch gh-pages-publish/.nojekyll
          cd gh-pages-publish
          git init
          git checkout -b gh-pages
          git add .
          git commit -m "Deploy Allure report"
          git remote add origin "https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
          git push --force origin gh-pages
